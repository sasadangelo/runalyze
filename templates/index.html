{% extends "base.html" %}

{% block title %}Salvatore D'Angelo Wellness Overview{% endblock %}

{% block extra_head %}
<script type="module" src="{{ url_for('static', filename='js/overview.js') }}" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.0.0"></script>
{% endblock %}

{% set active_page = 'overview' %}

{% block content %}
<h1>Salvatore D'Angelo Wellness</h1>
<div>
  <label for="startDate">Start Date:</label>
  <input type="date" id="startDate">
  <label for="endDate">End Date:</label>
  <input type="date" id="endDate">
  <button onclick="window.hrvApp.updateChart();window.fcrApp.updateChart();window.tssApp.updateChart();">Update
    Chart</button>
</div>
<canvas id="hrvChart" width="800" height="200"></canvas>
<br />
<canvas id="fcrChart" width="800" height="200"></canvas>
<br />
<canvas id="tssChart" width="800" height="200"></canvas>
{% endblock %}
