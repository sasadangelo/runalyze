{% extends "base.html" %}

{% block title %}Salvatore D'Angelo Training{% endblock %}

{% block content %}
<h1>Salvatore D'Angelo Training</h1>
<div>
    <label for="startDate">Start Date:</label>
    <input type="date" id="startDate">
    <label for="endDate">End Date:</label>
    <input type="date" id="endDate">
    <button onclick="updateAllCharts()">Update Chart</button>
</div>
<canvas id="pmcChart" width="800" height="300"></canvas>
<br />
<canvas id="tssChart" width="800" height="300"></canvas>
<br />
<canvas id="distanceChart" width="800" height="300"></canvas>
<br />
<canvas id="durationChart" width="800" height="300"></canvas>
<br />
<canvas id="tssWeeklyChart" width="800" height="300"></canvas>
<br />
<canvas id="distanceWeeklyChart" width="800" height="300"></canvas>
<br />
<canvas id="durationWeeklyChart" width="800" height="300"></canvas>
<br />
<canvas id="tlChart" width="800" height="300"></canvas>
<br />
<canvas id="vo2maxChart" width="800" height="300"></canvas>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.0.0"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script type="module" src="{{ url_for('static', filename='js/training.js') }}"></script>
<script>
    function updateAllCharts() {
        if (window.pmcApp) window.pmcApp.updateChart();
        if (window.tssApp) window.tssApp.updateChart();
        if (window.distanceApp) window.distanceApp.updateChart();
        if (window.durationApp) window.durationApp.updateChart();
        if (window.tssWeeklyApp) window.tssWeeklyApp.updateChart();
        if (window.tlApp) window.tlApp.updateChart();
        if (window.distanceWeeklyApp) window.distanceWeeklyApp.updateChart();
        if (window.durationWeeklyApp) window.durationWeeklyApp.updateChart();
        if (window.vo2maxApp) window.vo2maxApp.updateChart();
    }
</script>
{% endblock %}
